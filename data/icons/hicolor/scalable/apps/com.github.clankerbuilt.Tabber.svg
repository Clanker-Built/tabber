<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3584e4"/>
      <stop offset="100%" stop-color="#1a5fb4"/>
    </linearGradient>
    <linearGradient id="screenGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e1e2e"/>
      <stop offset="100%" stop-color="#181825"/>
    </linearGradient>
    <linearGradient id="tabGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#45475a"/>
      <stop offset="100%" stop-color="#313244"/>
    </linearGradient>
    <linearGradient id="activeTabGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#585b70"/>
      <stop offset="100%" stop-color="#45475a"/>
    </linearGradient>
  </defs>

  <!-- Outer rounded rectangle (window frame) -->
  <rect x="8" y="8" width="112" height="112" rx="16" ry="16" fill="url(#bgGrad)"/>

  <!-- Title bar area -->
  <rect x="14" y="14" width="100" height="24" rx="10" ry="10" fill="#2a4d8e" opacity="0.5"/>

  <!-- Tab bar -->
  <!-- Tab 1 (inactive) -->
  <rect x="16" y="16" width="28" height="18" rx="5" ry="5" fill="url(#tabGrad)"/>
  <circle cx="22" cy="25" r="2.5" fill="#f38ba8"/>
  <rect x="27" y="23" width="12" height="3" rx="1.5" fill="#6c7086"/>

  <!-- Tab 2 (active) -->
  <rect x="46" y="16" width="28" height="20" rx="5" ry="5" fill="url(#activeTabGrad)"/>
  <circle cx="52" cy="25" r="2.5" fill="#a6e3a1"/>
  <rect x="57" y="23" width="12" height="3" rx="1.5" fill="#bac2de"/>

  <!-- Tab 3 (inactive) -->
  <rect x="76" y="16" width="28" height="18" rx="5" ry="5" fill="url(#tabGrad)"/>
  <circle cx="82" cy="25" r="2.5" fill="#89b4fa"/>
  <rect x="87" y="23" width="12" height="3" rx="1.5" fill="#6c7086"/>

  <!-- Terminal screen -->
  <rect x="14" y="36" width="100" height="78" rx="8" ry="8" fill="url(#screenGrad)"/>

  <!-- Terminal prompt lines -->
  <!-- Line 1: prompt with command -->
  <text x="22" y="54" font-family="monospace" font-size="9" fill="#a6e3a1" font-weight="bold">$</text>
  <text x="30" y="54" font-family="monospace" font-size="9" fill="#cdd6f4">ssh server-01</text>

  <!-- Line 2: output -->
  <text x="22" y="66" font-family="monospace" font-size="8" fill="#89b4fa">Connected to</text>
  <text x="74" y="66" font-family="monospace" font-size="8" fill="#f9e2af">192.168.1.10</text>

  <!-- Line 3: prompt -->
  <text x="22" y="78" font-family="monospace" font-size="9" fill="#cba6f7" font-weight="bold">root@srv</text>
  <text x="68" y="78" font-family="monospace" font-size="9" fill="#a6adc8">:~#</text>

  <!-- Line 4: command -->
  <text x="22" y="90" font-family="monospace" font-size="9" fill="#cdd6f4">uptime</text>

  <!-- Cursor block -->
  <rect x="22" y="96" width="7" height="11" rx="1" fill="#a6e3a1" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0.2;0.8" dur="1.2s" repeatCount="indefinite"/>
  </rect>

  <!-- Subtle sidebar indicator on left -->
  <rect x="14" y="36" width="4" height="78" rx="2" fill="#3584e4" opacity="0.4"/>
</svg>
